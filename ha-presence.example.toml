# ha-presence example settings file
# Copy to ha-presence.toml (or ~/.config/ha-presence/config.toml) and edit as needed.
# Environment variables always override values set here.
# Custom path: set HA_PRESENCE_CONFIG=/path/to/file.toml

[presence]
# Identifier for this host (defaults to system hostname)
# hostname = "my-pc"

# Logical site/location name used in MQTT topics
# site = "home"

# How often (seconds) to publish a heartbeat while the host is present
# heartbeat_seconds = 30

[mqtt]
# MQTT broker address
host = "localhost"

# MQTT broker port
port = 1883

# Credentials — omit if the broker allows anonymous connections
# username = "mqtt-user"
# password = "mqtt-password"

# Prefix for all published MQTT topics  (<prefix>/<site>/<hostname>/...)
topic_prefix = "home"

[update]
# Auto-update strategy: "none" | "git" | "share"
source = "none"

# Required when source is "git" or "share" — path to repo / network share
# location = "/srv/ha-presence"

# Git ref to track (branch, tag, or commit SHA)
ref = "main"

# How often (seconds) to poll for updates
poll_seconds = 300
